name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: wardbalance-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: wardbalance-app/package-lock.json

      - run: npm ci

      - run: npm run typecheck

      - run: npm run test

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: wardbalance-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: wardbalance-app/package-lock.json

      - run: npm ci

      - run: npm run lint
